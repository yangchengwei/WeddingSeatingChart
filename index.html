<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測試網頁</title>
    <style>
        /* 這裡放一些簡單的 CSS 來讓畫面好看一點 */
        body {
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            padding-top: 100px;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            color: #0056b3;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
        }
        button:hover {
            background-color: #004494;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>這是一個測試網頁 🚀</h1>
        <p>哈囉！如果你看到這個畫面，代表你的 HTML 已經成功運行了。</p>
        
        <!-- 一個簡單的按鈕測試 JavaScript 功能 -->
        <button onclick="alert('測試成功！你的 JavaScript 也能正常運作！')">點擊測試</button>
    </div>

</body>
</html>
